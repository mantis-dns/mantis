name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@44694675825211faa026b3a33e688c6a60cee074 # v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@49933ea5288caeca8642d1e840197d9b7da38b05 # v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build && cd ..
          cp -r web/dist internal/web/dist

      - name: Run tests
        run: go test -race ./...

      - name: Cross-compile
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/mantis-linux-amd64 ./cmd/mantis
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/mantis-linux-arm64 ./cmd/mantis
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/mantis-darwin-amd64 ./cmd/mantis
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/mantis-darwin-arm64 ./cmd/mantis
          cd dist && sha256sum mantis-* > checksums.txt

      - name: Create release
        permissions:
          contents: write
        uses: softprops/action-gh-release@07b9bc1c3ddb658d9c9a6e6c1b8c3e1e8e0e0e0e # v2
        with:
          files: |
            dist/mantis-*
            dist/checksums.txt
          generate_release_notes: true
