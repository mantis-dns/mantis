name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@44694675825211faa026b3a33e688c6a60cee074 # v5
        with:
          go-version: '1.24'

      - name: Go test
        run: go test -race ./...

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/mantis

      - name: Go security scan
        uses: securego/gosec@master
        with:
          args: -exclude-generated ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e840197d9b7da38b05 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc -b

      - name: Build
        run: cd web && npm run build

      - name: Audit dependencies
        run: cd web && npm audit --audit-level=moderate
