name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Go test
        run: go test -race ./...

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/mantis

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: cd web && npm ci

      - name: Type check
        run: cd web && npx tsc -b

      - name: Build
        run: cd web && npm run build
