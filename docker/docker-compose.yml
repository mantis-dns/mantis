services:
  mantis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mantis
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8080:8080"
    volumes:
      - mantis-data:/data
    cap_add:
      - NET_ADMIN
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      - MANTIS_DNS_LISTEN_ADDRESS=0.0.0.0:53
      - MANTIS_API_LISTEN_ADDRESS=0.0.0.0:8080

volumes:
  mantis-data:
